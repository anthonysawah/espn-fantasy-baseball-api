name: Feature request
description: Suggest a new endpoint, resource, or helper.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: What should the public interface look like?
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: willing
    attributes:
      label: Willing to contribute?
      options:
        - label: I'm willing to open a PR for this.
